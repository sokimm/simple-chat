<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-input: #313244;
      --accent: #89b4fa;
      --accent2: #cba6f7;
      --text: #cdd6f4;
      --text-muted: #6c7086;
      --text-sidebar: #bac2de;
      --border: #313244;
      --sys-color: #a6e3a1;
      --radius: 10px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-main);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Login ── */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      background: var(--bg-sidebar); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 48px 40px;
      width: min(400px, 90vw); box-shadow: 0 8px 32px #00000060;
    }
    #login-screen h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    #login-screen p  { color: var(--text-muted); font-size: 0.9rem; }
    #login-screen input {
      width: 100%; padding: 12px 16px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    #login-screen input:focus { border-color: var(--accent); }
    #login-screen button {
      width: 100%; padding: 12px; background: var(--accent); color: var(--bg-main);
      border: none; border-radius: var(--radius); font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    #login-screen button:hover { opacity: 0.85; }
    #login-error { color: #f38ba8; font-size: 0.85rem; min-height: 1em; }

    /* ── Chat layout ── */
    #chat-screen {
      display: none;
      width: min(1000px, 98vw); height: min(700px, 96dvh);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; box-shadow: 0 8px 32px #00000060;
    }
    #chat-screen.active { display: flex; }

    /* Sidebar */
    #sidebar {
      width: 200px; flex-shrink: 0; background: var(--bg-sidebar);
      display: flex; flex-direction: column; border-right: 1px solid var(--border);
    }
    #sidebar-header {
      padding: 18px 16px 14px; font-size: 1rem; font-weight: 700;
      color: var(--accent); border-bottom: 1px solid var(--border); letter-spacing: 0.5px;
    }
    #online-label {
      padding: 12px 16px 6px; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);
    }
    #user-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
    .user-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border-radius: 6px; font-size: 0.85rem; color: var(--text-sidebar);
    }
    .user-item.me { color: var(--accent); font-weight: 600; }
    #connection-status {
      padding: 10px 16px; font-size: 0.72rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    #connection-status span { font-weight: 600; }
    #connection-status.connected span    { color: var(--sys-color); }
    #connection-status.disconnected span { color: #f38ba8; }

    /* Main area */
    #main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); min-width: 0; }

    #chat-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 1rem; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    #chat-header .room-icon { color: var(--accent2); font-size: 1.1rem; }
    #chat-header .you-badge { margin-left: auto; font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }
    #chat-header .you-badge strong { color: var(--accent); }
    #notif-dot {
      display: none; width: 10px; height: 10px; border-radius: 50%;
      background: var(--sys-color); box-shadow: 0 0 6px var(--sys-color); flex-shrink: 0;
    }
    #notif-dot.active { display: block; }

    /* Messages wrapper (relative for scroll btn) */
    #messages-wrap { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

    #messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
    }

    /* Scroll-to-bottom popup */
    #scroll-btn {
      display: none; position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg-main); border: none; border-radius: 20px;
      padding: 6px 18px; font-size: 0.82rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 2px 14px #00000070; white-space: nowrap; z-index: 10;
      transition: opacity 0.2s;
    }
    #scroll-btn.visible { display: block; }
    #scroll-btn:hover { opacity: 0.85; }

    /* Messages */
    .msg-row { display: flex; flex-direction: column; max-width: 72%; }
    .msg-row.self  { align-self: flex-end;   align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }

    .msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 2px; padding: 0 4px; }
    .msg-row.self .msg-meta { text-align: right; }
    .msg-meta .sender { font-weight: 700; }

    .msg-bubble {
      padding: 8px 14px; border-radius: 16px; font-size: 0.92rem;
      line-height: 1.5; word-break: break-word; max-width: 100%;
    }
    .msg-row.self  .msg-bubble { background: #2d4f7c; color: var(--text); border-bottom-right-radius: 4px; }
    .msg-row.other .msg-bubble { color: var(--text); border-bottom-left-radius: 4px; }

    /* Reply quote inside bubble */
    .msg-quote {
      border-left: 3px solid;
      border-radius: 6px; padding: 4px 8px; margin-bottom: 6px;
      background: #00000028; font-size: 0.78rem;
    }
    .msg-quote .q-sender { font-weight: 700; margin-bottom: 1px; }
    .msg-quote .q-text {
      color: var(--text-muted); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; display: block; max-width: 260px;
    }

    /* Reply button (appears on row hover) */
    .reply-btn {
      opacity: 0; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text-muted); font-size: 0.72rem;
      padding: 2px 9px; cursor: pointer; margin-top: 4px;
      transition: opacity 0.15s, color 0.15s;
    }
    .msg-row:hover .reply-btn { opacity: 1; }
    .reply-btn:hover { color: var(--text); background: var(--border); }

    .msg-system {
      align-self: center; font-size: 0.75rem; color: var(--sys-color);
      background: #a6e3a115; padding: 3px 12px; border-radius: 20px;
      margin: 4px 0; font-style: italic;
    }

    /* Reply preview bar (above input) */
    #reply-bar {
      display: none; align-items: center; gap: 10px;
      padding: 7px 16px; background: var(--bg-sidebar);
      border-top: 1px solid var(--border); border-left: 3px solid var(--accent);
    }
    #reply-bar.active { display: flex; }
    #reply-bar .rb-info { flex: 1; overflow: hidden; }
    #reply-bar .rb-sender { font-size: 0.75rem; font-weight: 700; color: var(--accent); }
    #reply-bar .rb-text {
      font-size: 0.75rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #reply-cancel {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.1rem; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    #reply-cancel:hover { color: var(--text); }

    /* Input bar */
    #input-bar {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end; background: var(--bg-sidebar);
    }
    #msg-input {
      flex: 1; padding: 10px 16px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 16px;
      color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
      font-family: var(--font); line-height: 1.4; resize: none;
      overflow-y: auto; max-height: 120px; min-height: 40px;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input:disabled { opacity: 0.5; }
    #send-btn {
      padding: 10px 20px; background: var(--accent); color: var(--bg-main);
      border: none; border-radius: 24px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s; font-size: 0.9rem;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Links inside bubbles */
    .msg-bubble a {
      color: #93c5fd;
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
    }
    .msg-bubble a:hover { color: #bfdbfe; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Delete button ── */
    .delete-btn {
      opacity: 0; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 12px; color: #f38ba8; font-size: 0.72rem;
      padding: 2px 9px; cursor: pointer; margin-top: 4px; margin-left: 4px;
      transition: opacity 0.15s, background 0.15s;
    }
    .msg-row:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { background: #3d2020; border-color: #f38ba8; }

    /* ── Settings button in header ── */
    #settings-btn {
      margin-left: 8px; background: none; border: none; color: var(--text-muted);
      font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    #settings-btn:hover { color: var(--text); background: var(--bg-input); }

    /* ── Password change modal ── */
    #settings-overlay {
      display: none; position: fixed; inset: 0; background: #00000090;
      z-index: 100; align-items: center; justify-content: center;
    }
    #settings-overlay.active { display: flex; }
    #settings-modal {
      background: var(--bg-sidebar); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; width: min(380px, 90vw);
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 8px 32px #00000080;
    }
    #settings-modal h2 { font-size: 1.05rem; color: var(--accent); }
    #settings-modal p  { font-size: 0.82rem; color: var(--text-muted); }
    #settings-modal input {
      width: 100%; padding: 10px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    #settings-modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btns button {
      padding: 9px 20px; border-radius: var(--radius); border: none;
      cursor: pointer; font-weight: 600; font-size: 0.9rem;
    }
    #pw-save-btn   { background: var(--accent); color: var(--bg-main); }
    #pw-cancel-btn { background: var(--bg-input); color: var(--text); }
    #pw-error { color: #f38ba8; font-size: 0.82rem; min-height: 1em; }

    /* ── Reaction picker ── */
    .reaction-picker {
      display: none; gap: 2px;
      background: var(--bg-sidebar); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 6px; margin: 2px 0;
    }
    .msg-row:hover .reaction-picker { display: flex; }
    .reaction-picker button {
      background: none; border: none; cursor: pointer; font-size: 1.05rem;
      padding: 2px 4px; border-radius: 50%; line-height: 1;
      transition: transform 0.1s, background 0.1s;
    }
    .reaction-picker button:hover { transform: scale(1.35); background: var(--bg-input); }

    /* ── Reaction chips ── */
    .msg-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin: 2px 0; min-height: 0; }
    .reaction-chip {
      display: flex; align-items: center; gap: 3px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 12px; padding: 2px 8px; font-size: 0.82rem;
      cursor: pointer; color: var(--text); transition: border-color 0.15s, background 0.15s;
    }
    .reaction-chip.mine { border-color: var(--accent); background: #1e3a5f; }
    .reaction-chip:hover { border-color: var(--text-muted); }
    .reaction-chip span { font-size: 0.75rem; color: var(--text-muted); }
    .reaction-chip.mine span { color: var(--accent); }

    /* ── Bubble wrapper (bubble + read receipt side by side) ── */
    .bubble-wrap { display: flex; align-items: flex-end; gap: 5px; max-width: 100%; }

    /* ── Read receipt ── */
    .read-receipt { font-size: 0.68rem; white-space: nowrap; padding-bottom: 3px; flex-shrink: 0; }
    .read-receipt.read   { color: var(--accent); }
    .read-receipt.unread { color: var(--text-muted); }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <h1>&#x1F4AC; Chat App</h1>
  <p>Enter a username to join the room</p>
  <input id="username-input" type="text" placeholder="Your username…" maxlength="32" autocomplete="off" />
  <input id="password-input" type="password" placeholder="Room password…" autocomplete="off" style="display:none" />
  <div id="login-error"></div>
  <button id="join-btn">Join Chat</button>
</div>

<!-- ── Password Change Modal ── -->
<div id="settings-overlay">
  <div id="settings-modal">
    <h2>🔒 채팅방 비밀번호 변경</h2>
    <p>비밀번호를 설정하면 아는 사람만 입장할 수 있습니다.<br>새 비밀번호를 비워두면 비밀번호가 해제됩니다.</p>
    <input id="pw-current" type="password" placeholder="현재 비밀번호 (없으면 비워두세요)" autocomplete="off" />
    <input id="pw-new"     type="password" placeholder="새 비밀번호 (해제하려면 비워두세요)" autocomplete="off" />
    <div id="pw-error"></div>
    <div class="modal-btns">
      <button id="pw-cancel-btn">취소</button>
      <button id="pw-save-btn">저장</button>
    </div>
  </div>
</div>

<!-- ── Chat Screen ── -->
<div id="chat-screen">
  <div id="sidebar">
    <div id="sidebar-header">&#x1F4AC; ChatApp</div>
    <div id="online-label">Online</div>
    <div id="user-list"></div>
    <div id="connection-status" class="disconnected">Status: <span>Disconnected</span></div>
  </div>

  <div id="main">
    <div id="chat-header">
      <span class="room-icon">#</span> general
      <span id="notif-dot" title="New message"></span>
      <button id="settings-btn" title="채팅방 비밀번호 변경">🔒</button>
      <span class="you-badge">Logged in as <strong id="you-name"></strong></span>
    </div>

    <div id="messages-wrap">
      <div id="messages"></div>
      <button id="scroll-btn">↓ 새 메시지 <span id="scroll-count"></span></button>
    </div>

    <div id="reply-bar">
      <div class="rb-info">
        <div class="rb-sender" id="rb-sender"></div>
        <div class="rb-text"   id="rb-text"></div>
      </div>
      <button id="reply-cancel" title="Cancel reply">✕</button>
    </div>

    <div id="input-bar">
      <textarea id="msg-input" placeholder="Type a message…" maxlength="1000" autocomplete="off" disabled rows="1"></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let username        = '';
  let ws              = null;
  let reconnectTimer  = null;
  let reconnectDelay  = 1500;
  const MAX_RECONNECT_DELAY = 30000;
  let passwordRequired = false;
  let replyTo         = null;   // { id, username, text }
  let newMsgCount     = 0;      // unseen messages while scrolled up
  let currentOnlineUsers = [];

  const REACTION_EMOJIS = ['❤️', '🤣', '👍', '😒', '😢', '👌'];

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const loginScreen   = document.getElementById('login-screen');
  const chatScreen    = document.getElementById('chat-screen');
  const usernameInput = document.getElementById('username-input');
  const joinBtn       = document.getElementById('join-btn');
  const loginError    = document.getElementById('login-error');
  const messagesEl    = document.getElementById('messages');
  const msgInput      = document.getElementById('msg-input');
  const sendBtn       = document.getElementById('send-btn');
  const userList      = document.getElementById('user-list');
  const youName       = document.getElementById('you-name');
  const connStatus    = document.getElementById('connection-status');
  const notifDot      = document.getElementById('notif-dot');
  const passwordInput = document.getElementById('password-input');
  const scrollBtn     = document.getElementById('scroll-btn');
  const scrollCount   = document.getElementById('scroll-count');
  const replyBar      = document.getElementById('reply-bar');
  const rbSender      = document.getElementById('rb-sender');
  const rbText        = document.getElementById('rb-text');
  const replyCancel      = document.getElementById('reply-cancel');
  const settingsBtn      = document.getElementById('settings-btn');
  const settingsOverlay  = document.getElementById('settings-overlay');
  const pwCurrent        = document.getElementById('pw-current');
  const pwNew            = document.getElementById('pw-new');
  const pwError          = document.getElementById('pw-error');
  const pwSaveBtn        = document.getElementById('pw-save-btn');
  const pwCancelBtn      = document.getElementById('pw-cancel-btn');

  // ── User colors ────────────────────────────────────────────────────────────
  const USER_COLORS = [
    { bg: '#3d2b4f', border: '#7c4fa0' },
    { bg: '#2b3d2b', border: '#4fa04f' },
    { bg: '#3d2b2b', border: '#a04f4f' },
    { bg: '#3d3520', border: '#a08c40' },
    { bg: '#1e3a3a', border: '#3aadad' },
    { bg: '#3a2020', border: '#c06040' },
    { bg: '#20203a', border: '#6060c0' },
    { bg: '#3a2030', border: '#c050a0' },
    { bg: '#203a28', border: '#40c080' },
    { bg: '#3a3020', border: '#c0a040' },
  ];
  function hashUsername(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return h % USER_COLORS.length;
  }
  function getUserColor(name) { return USER_COLORS[hashUsername(name)]; }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function formatTime(isoStr) {
    try { return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    catch { return ''; }
  }
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── URL linkifier ─────────────────────────────────────────────────────────
  // Matches: https?:// URLs, www. URLs, and bare domains with known TLDs
  const URL_RE = /(?:https?:\/\/[^\s<>"']+)|(?:www\.[^\s<>"']+)|(?:[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.(?:co\.kr|co\.jp|co\.uk|com\.au|com\.br|co\.nz|or\.kr|ne\.kr|go\.kr|ac\.kr|hs\.kr|ms\.kr|es\.kr|pe\.kr|re\.kr|seoul\.kr|com|net|org|io|kr|jp|uk|de|fr|ca|au|us|info|biz|tv|me|co|app|dev|ai|xyz|shop|store|site|online|tech|edu|gov|in|sg|hk|nl|se|no|fi|dk|at|ch|es|it|ru|br|mx|cn|tw|vn|th|my|ph|id|nz|za|ng|ar|cl|pl|hu|ro|bg|ua|tr|il|ae|sa|pk|lk)(?:\/[^\s<>"']*)?)/gi;

  function linkifyText(raw) {
    const parts = [];
    let last = 0, m;
    URL_RE.lastIndex = 0;
    while ((m = URL_RE.exec(raw)) !== null) {
      if (m.index > last) parts.push({ t: 'text', v: raw.slice(last, m.index) });
      parts.push({ t: 'url', v: m[0] });
      last = m.index + m[0].length;
    }
    parts.push({ t: 'text', v: raw.slice(last) });

    return parts.map(p => {
      if (p.t === 'text') return escapeHtml(p.v).replace(/\n/g, '<br>');
      // Strip trailing punctuation that's likely not part of the URL
      const url = p.v.replace(/[.,!?;:'")\]>]+$/, '');
      const trailing = escapeHtml(p.v.slice(url.length));
      const href = /^https?:\/\//i.test(url) ? url : 'https://' + url;
      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>${trailing}`;
    }).join('');
  }
  function isNearBottom() {
    return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
  }
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Scroll popup ───────────────────────────────────────────────────────────
  function showScrollBtn() {
    scrollBtn.classList.add('visible');
    scrollCount.textContent = newMsgCount > 0 ? newMsgCount + '개' : '';
  }
  function hideScrollBtn() {
    newMsgCount = 0;
    scrollBtn.classList.remove('visible');
    scrollCount.textContent = '';
  }

  messagesEl.addEventListener('scroll', () => {
    if (isNearBottom()) hideScrollBtn();
  });

  scrollBtn.addEventListener('click', () => {
    scrollToBottom();
    hideScrollBtn();
  });

  // ── Reply ──────────────────────────────────────────────────────────────────
  function setReply(msg) {
    replyTo = { id: msg.id, username: msg.username, text: msg.text };
    rbSender.textContent = msg.username;
    rbText.textContent   = msg.text;
    replyBar.classList.add('active');
    msgInput.focus();
  }
  function clearReply() {
    replyTo = null;
    replyBar.classList.remove('active');
  }
  replyCancel.addEventListener('click', clearReply);

  // ── Render helpers ─────────────────────────────────────────────────────────
  function setConnectionStatus(connected) {
    connStatus.className = connected ? 'connected' : 'disconnected';
    connStatus.querySelector('span').textContent = connected ? 'Connected' : 'Disconnected';
    msgInput.disabled = !connected;
    sendBtn.disabled  = !connected;
  }

  function renderOnlineUsers(users) {
    currentOnlineUsers = users;
    userList.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item' + (u === username ? ' me' : '');
      const dotColor = u === username ? 'var(--sys-color)' : getUserColor(u).border;
      div.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>${escapeHtml(u === username ? u + ' (you)' : u)}`;
      userList.appendChild(div);
    });
    refreshAllReadReceipts();
  }

  // ── Reaction helpers ───────────────────────────────────────────────────────
  function sendReaction(msgId, emoji) {
    if (!ws || ws.readyState !== WebSocket.OPEN || !msgId) return;
    ws.send(JSON.stringify({ action: 'react', id: msgId, emoji }));
  }

  function sendMarkRead(ids) {
    if (!ws || ws.readyState !== WebSocket.OPEN || !ids.length) return;
    ws.send(JSON.stringify({ action: 'mark_read', ids }));
  }

  function renderReactionsInEl(el, msgId, reactions) {
    el.innerHTML = '';
    Object.entries(reactions || {}).forEach(([emoji, users]) => {
      if (!users || !users.length) return;
      const chip = document.createElement('button');
      chip.className = 'reaction-chip' + (users.includes(username) ? ' mine' : '');
      chip.innerHTML = `${emoji} <span>${users.length}</span>`;
      chip.title = users.join(', ');
      chip.addEventListener('click', () => sendReaction(msgId, emoji));
      el.appendChild(chip);
    });
  }

  function updateReadReceiptEl(el, readBy) {
    el.className = 'read-receipt';
    const readOthers = (readBy || []).filter(u => u !== username);
    const onlineOthers = currentOnlineUsers.filter(u => u !== username);
    const unreadCount = Math.max(0, onlineOthers.length - readOthers.length);
    if (unreadCount > 0) {
      el.textContent = unreadCount;
      el.classList.add('unread');
    } else if (readOthers.length > 0) {
      el.textContent = '읽음';
      el.classList.add('read');
    } else {
      el.textContent = '';
    }
  }

  function refreshAllReadReceipts() {
    messagesEl.querySelectorAll('.read-receipt[data-msg-id]').forEach(el => {
      updateReadReceiptEl(el, JSON.parse(el.dataset.readBy || '[]'));
    });
  }

  function appendChatMessage(msg, isHistory) {
    const isSelf  = msg.username === username;
    const color   = getUserColor(msg.username);
    const wasNearBottom = isNearBottom();

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isSelf ? 'self' : 'other');
    if (msg.id) row.dataset.msgId = msg.id;

    // Meta
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const senderColor = isSelf ? '#89b4fa' : color.border;
    meta.innerHTML = `<span class="sender" style="color:${senderColor}">${escapeHtml(msg.username)}</span> &middot; ${formatTime(msg.timestamp)}`;

    // Bubble
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (isSelf) {
      bubble.style.background = '#2d4f7c';
    } else {
      bubble.style.background    = color.bg;
      bubble.style.borderColor   = color.border;
      bubble.style.borderWidth   = '1px';
      bubble.style.borderStyle   = 'solid';
    }

    // Quote block (if this is a reply)
    if (msg.reply) {
      const qColor = getUserColor(msg.reply.username).border;
      const quote  = document.createElement('div');
      quote.className = 'msg-quote';
      quote.style.borderColor = qColor;
      quote.innerHTML = `<div class="q-sender" style="color:${qColor}">${escapeHtml(msg.reply.username)}</div><span class="q-text">${escapeHtml(msg.reply.text)}</span>`;
      bubble.appendChild(quote);
    }

    const textSpan = document.createElement('span');
    textSpan.innerHTML = linkifyText(msg.text);
    bubble.appendChild(textSpan);

    // Reaction picker (shown on row hover)
    const pickerEl = document.createElement('div');
    pickerEl.className = 'reaction-picker';
    REACTION_EMOJIS.forEach(emoji => {
      const btn = document.createElement('button');
      btn.textContent = emoji;
      btn.addEventListener('click', () => sendReaction(msg.id, emoji));
      pickerEl.appendChild(btn);
    });

    // Reactions display
    const reactionsEl = document.createElement('div');
    reactionsEl.className = 'msg-reactions';
    if (msg.id) reactionsEl.dataset.msgId = msg.id;
    renderReactionsInEl(reactionsEl, msg.id, msg.reactions || {});

    // Action buttons row
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'display:flex;gap:0;';

    // Reply button
    const replyBtn = document.createElement('button');
    replyBtn.className = 'reply-btn';
    replyBtn.textContent = '↩ Reply';
    replyBtn.addEventListener('click', () => setReply(msg));
    btnWrap.appendChild(replyBtn);

    // Delete button — only for own messages
    if (isSelf && msg.id) {
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '🗑 삭제';
      delBtn.addEventListener('click', () => deleteMessage(msg.id));
      btnWrap.appendChild(delBtn);
    }

    // Wrap bubble + read receipt side by side
    const bubbleWrap = document.createElement('div');
    bubbleWrap.className = 'bubble-wrap';
    if (isSelf && msg.id) {
      const readEl = document.createElement('div');
      readEl.dataset.msgId = msg.id;
      const readBy = msg.read_by || [username];
      readEl.dataset.readBy = JSON.stringify(readBy);
      updateReadReceiptEl(readEl, readBy);
      bubbleWrap.appendChild(readEl);  // read receipt on the left of bubble
    }
    bubbleWrap.appendChild(bubble);

    row.appendChild(meta);
    row.appendChild(bubbleWrap);
    row.appendChild(pickerEl);
    row.appendChild(reactionsEl);
    row.appendChild(btnWrap);

    messagesEl.appendChild(row);

    // Scroll logic — always scroll for own messages or history load
    if (isSelf || isHistory) {
      scrollToBottom();
    } else if (wasNearBottom) {
      scrollToBottom();
    } else {
      newMsgCount++;
      showScrollBtn();
    }
  }

  function appendSystemMessage(text) {
    const wasNearBottom = isNearBottom();
    const div = document.createElement('div');
    div.className = 'msg-system';
    div.textContent = text;
    messagesEl.appendChild(div);
    if (wasNearBottom) scrollToBottom();
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(username)}`);

    ws.onopen = () => {
      setConnectionStatus(true);
      reconnectDelay = 1500;
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (event) => {
      let data;
      try { data = JSON.parse(event.data); } catch { return; }

      if (data.type === 'history') {
        messagesEl.innerHTML = '';
        data.messages.forEach(m => appendChatMessage(m, true));
        renderOnlineUsers(data.online_users || []);
        const ids = data.messages.map(m => m.id).filter(Boolean);
        if (ids.length) sendMarkRead(ids);
        return;
      }

      if (data.online_users) renderOnlineUsers(data.online_users);

      if (data.type === 'chat') {
        appendChatMessage(data, false);
        if (data.username !== username) {
          notifDot.classList.add('active');
          if (document.hidden) { unreadCount++; updateTabTitle(); }
          if (data.id) sendMarkRead([data.id]);
        }
      } else if (data.type === 'system') {
        appendSystemMessage(data.text);
      } else if (data.type === 'delete') {
        const el = messagesEl.querySelector(`[data-msg-id="${CSS.escape(data.id)}"]`);
        if (el) el.remove();
      } else if (data.type === 'reaction') {
        const el = messagesEl.querySelector(`.msg-reactions[data-msg-id="${CSS.escape(data.id)}"]`);
        if (el) renderReactionsInEl(el, data.id, data.reactions);
      } else if (data.type === 'read_update') {
        const el = messagesEl.querySelector(`.read-receipt[data-msg-id="${CSS.escape(data.id)}"]`);
        if (el) {
          el.dataset.readBy = JSON.stringify(data.read_by);
          updateReadReceiptEl(el, data.read_by);
        }
      }
    };

    ws.onclose = () => { setConnectionStatus(false); scheduleReconnect(); };
    ws.onerror = () => { ws.close(); };
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      appendSystemMessage(`Reconnecting… (${reconnectDelay / 1000}s)`);
      connectWS();
      reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
    }, reconnectDelay);
  }

  function autoResizeInput() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    const payload = { text };
    if (replyTo) payload.reply = replyTo;
    ws.send(JSON.stringify(payload));
    msgInput.value = '';
    msgInput.style.height = 'auto';
    clearReply();
    msgInput.focus();
  }

  function deleteMessage(msgId) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (!confirm('이 메시지를 삭제할까요?')) return;
    ws.send(JSON.stringify({ action: 'delete', id: msgId }));
  }

  // ── Password change modal ─────────────────────────────────────────────────
  function openSettings() {
    pwCurrent.value = '';
    pwNew.value = '';
    pwError.textContent = '';
    settingsOverlay.classList.add('active');
    pwCurrent.focus();
  }
  function closeSettings() {
    settingsOverlay.classList.remove('active');
  }

  async function savePassword() {
    pwError.textContent = '';
    pwSaveBtn.disabled = true;
    try {
      const res  = await fetch('/room-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password: pwCurrent.value, new_password: pwNew.value }),
      });
      const body = await res.json();
      if (!res.ok) { pwError.textContent = body.detail || '변경 실패'; return; }
      closeSettings();
      appendSystemMessage(pwNew.value ? '채팅방 비밀번호가 변경되었습니다.' : '채팅방 비밀번호가 해제되었습니다.');
    } catch {
      pwError.textContent = '서버 연결 오류';
    } finally {
      pwSaveBtn.disabled = false;
    }
  }

  settingsBtn.addEventListener('click', openSettings);
  pwCancelBtn.addEventListener('click', closeSettings);
  pwSaveBtn.addEventListener('click', savePassword);
  settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) closeSettings(); });
  pwNew.addEventListener('keydown', e => { if (e.key === 'Enter') savePassword(); });

  // ── Login ──────────────────────────────────────────────────────────────────
  async function initRoomInfo() {
    try {
      const res  = await fetch('/room-info');
      const data = await res.json();
      passwordRequired = data.password_required;
      if (passwordRequired) passwordInput.style.display = '';
    } catch { /* server not ready */ }
  }

  async function joinChat() {
    const name = usernameInput.value.trim();
    if (!name)          { loginError.textContent = 'Please enter a username.'; return; }
    if (name.length>32) { loginError.textContent = 'Username too long (max 32 chars).'; return; }
    if (passwordRequired && !passwordInput.value) { loginError.textContent = 'Please enter the room password.'; return; }

    joinBtn.disabled = true;
    loginError.textContent = '';

    try {
      const res  = await fetch('/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: name, password: passwordInput.value }),
      });
      const body = await res.json();
      if (!res.ok) { loginError.textContent = body.detail || 'Error joining chat.'; joinBtn.disabled = false; return; }

      username = name;
      youName.textContent = username;
      loginScreen.style.display = 'none';
      chatScreen.classList.add('active');
      connectWS();
      msgInput.focus();
    } catch {
      loginError.textContent = 'Could not connect to server.';
      joinBtn.disabled = false;
    }
  }

  // ── Tab notification ───────────────────────────────────────────────────────
  let unreadCount   = 0;
  const originalTitle = document.title;

  function updateTabTitle() {
    document.title = unreadCount > 0 ? `● (${unreadCount}) ${originalTitle}` : originalTitle;
  }

  window.addEventListener('focus', () => {
    unreadCount = 0;
    updateTabTitle();
    notifDot.classList.remove('active');
  });

  // ── Event listeners ────────────────────────────────────────────────────────
  joinBtn.addEventListener('click', joinChat);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('input', autoResizeInput);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.altKey) {
      e.preventDefault();
      sendMessage();
    } else if (e.key === 'Enter' && e.altKey) {
      e.preventDefault();
      const pos = msgInput.selectionStart;
      msgInput.value = msgInput.value.slice(0, pos) + '\n' + msgInput.value.slice(pos);
      msgInput.selectionStart = msgInput.selectionEnd = pos + 1;
      autoResizeInput();
    }
  });
  msgInput.addEventListener('focus', () => notifDot.classList.remove('active'));
  document.getElementById('chat-header').addEventListener('click', () => notifDot.classList.remove('active'));

  initRoomInfo();
</script>
</body>
</html>
